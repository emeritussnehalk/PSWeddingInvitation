<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#d9c8ee" />
  <title>Pooja &amp; Sarvesh | Choose Language</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: light;
      --gold: #c9a44a;
      --gold-light: #f1d77c;
      --royal: #8c68bf;
      --plum: #5f338d;
      --plum-deep: #45205f;
      --ink: #33243d;
      --soft: #fbf8ff;
      --line: rgba(122, 82, 168, 0.22);
      --shadow: 0 28px 70px rgba(76, 49, 112, 0.18);
      --glow: 0 0 28px rgba(142, 104, 191, 0.16);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: "Cormorant Garamond", Georgia, serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 16%, rgba(255, 255, 255, 0.78), transparent 26%),
        radial-gradient(circle at 84% 82%, rgba(241, 215, 124, 0.16), transparent 24%),
        linear-gradient(180deg, #e4d8f3 0%, #c4acdf 48%, #9976c8 100%);
    }

    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 12px rgba(201, 164, 74, 0.4);
      opacity: 0;
      animation: twinkle 4.5s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.6); }
      50% { opacity: 0.95; transform: scale(1.25); }
    }

    .stage {
      position: relative;
      width: min(100vw, 430px);
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 22px 18px;
      isolation: isolate;
    }

    @media (min-width: 440px) {
      .stage {
        min-height: min(100dvh, 860px);
      }
    }

    .stage::before,
    .stage::after {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      pointer-events: none;
      opacity: 0.78;
      background: center / contain no-repeat url("flower 2.webp");
      filter: drop-shadow(0 14px 24px rgba(95, 51, 141, 0.12));
      z-index: 0;
    }

    .stage::before {
      top: -26px;
      left: -38px;
      transform: rotate(-12deg);
    }

    .stage::after {
      right: -40px;
      bottom: -30px;
      transform: scaleX(-1) rotate(-8deg);
    }

    .stage > * {
      position: relative;
      z-index: 1;
    }

    .selector-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 380px;
      padding: 28px 24px 24px;
      border-radius: 32px;
      overflow: hidden;
      background:
        radial-gradient(circle at 0% 0%, rgba(95, 51, 141, 0.1), transparent 28%),
        radial-gradient(circle at 100% 100%, rgba(201, 164, 74, 0.12), transparent 26%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(251, 248, 255, 0.78));
      border: 1px solid rgba(255, 255, 255, 0.68);
      box-shadow: 0 18px 40px rgba(95, 51, 141, 0.12);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      text-align: center;
    }

    .selector-card::before {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(201, 164, 74, 0.3);
      border-radius: 22px;
      pointer-events: none;
    }

    .logo {
      width: 84px;
      height: 84px;
      margin: 0 auto 12px;
      display: block;
      border-radius: 50%;
      filter: drop-shadow(0 8px 18px rgba(95, 51, 141, 0.16));
    }

    .eyebrow {
      margin: 0 0 6px;
      font-family: Cinzel, serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--plum);
    }

    h1 {
      margin: 0;
      font-family: Cinzel, serif;
      font-size: clamp(1.8rem, 7vw, 2.3rem);
      line-height: 1.02;
      color: var(--plum-deep);
    }

    .subline {
      margin: 12px auto 0;
      max-width: 26ch;
      font-size: 1.02rem;
      line-height: 1.45;
      color: rgba(51, 36, 61, 0.82);
    }

    .ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 16px 0 18px;
      color: var(--gold);
      font-size: 0.72rem;
    }

    .ornament::before,
    .ornament::after {
      content: "";
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .language-grid {
      display: grid;
      gap: 12px;
    }

    .language-link {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      min-height: 82px;
      padding: 14px 16px;
      border-radius: 20px;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--line);
      box-shadow: 0 10px 22px rgba(95, 51, 141, 0.08);
      transition: transform 220ms var(--ease), box-shadow 220ms var(--ease), border-color 220ms var(--ease);
      color: inherit;
    }

    .language-link:hover,
    .language-link:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(95, 51, 141, 0.34);
      box-shadow: 0 14px 28px rgba(95, 51, 141, 0.14);
      outline: none;
    }

    .language-badge {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-family: Cinzel, serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--plum-deep);
      background: linear-gradient(180deg, #ffffff, #efe6fa);
      border: 1px solid rgba(122, 82, 168, 0.22);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    .language-copy {
      text-align: left;
      min-width: 0;
    }

    .language-title {
      display: block;
      font-family: Cinzel, serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--plum-deep);
    }

    .language-note {
      display: block;
      margin-top: 2px;
      font-size: 0.9rem;
      color: rgba(51, 36, 61, 0.72);
    }

    .language-link--marathi .language-badge,
    .language-link--marathi .language-title,
    .language-link--marathi .language-note {
      font-family: "Noto Sans Devanagari", "Nirmala UI", "Mangal", sans-serif;
      letter-spacing: 0;
      text-transform: none;
      font-style: normal;
    }

    .language-arrow {
      font-family: Cinzel, serif;
      font-size: 1.1rem;
      color: var(--plum);
    }

    .footer-note {
      margin: 18px 0 0;
      font-family: Cinzel, serif;
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(69, 32, 95, 0.62);
    }

    @media (max-width: 380px) {
      .selector-card {
        padding: 22px 16px 18px;
        border-radius: 26px;
      }

      .language-link {
        min-height: 74px;
        padding: 12px 13px;
      }

      .language-badge {
        width: 42px;
        height: 42px;
        font-size: 0.88rem;
      }

      .language-title {
        font-size: 0.92rem;
      }

      .language-note {
        font-size: 0.84rem;
      }
    }
  </style>
</head>
<body>
  <div class="ambient" id="ambient" aria-hidden="true"></div>

  <main class="stage">
    <section class="selector-card" aria-label="Language selection">
      <img src="ps-logo.png" alt="Pooja and Sarvesh monogram" class="logo" width="84" height="84" />
      <p class="eyebrow">Pooja &amp; Sarvesh</p>
      <h1>Wedding Invitation</h1>
      <p class="subline">Select the language in which you would like to experience the wedding card.</p>
      <div class="ornament" aria-hidden="true">✦</div>

      <div class="language-grid">
                <a class="language-link" href="index-english.html" aria-label="Open English wedding card">
          <span class="language-badge" aria-hidden="true">EN</span>
          <span class="language-copy">
            <span class="language-title">English</span>
            <span class="language-note">Open the invitation in English</span>
          </span>
          <span class="language-arrow" aria-hidden="true">›</span>
        </a>

                <a class="language-link language-link--marathi" href="index-marathi.html" aria-label="Open Marathi wedding card">
          <span class="language-badge" aria-hidden="true">म</span>
          <span class="language-copy">
            <span class="language-title">मराठी</span>
            <span class="language-note">मराठीत निमंत्रण पाहा</span>
          </span>
          <span class="language-arrow" aria-hidden="true">›</span>
        </a>
      </div>

      <p class="footer-note">With love, blessings, and joy</p>
    </section>
  </main>

  <script>
    const ambient = document.getElementById("ambient");
    for (let i = 0; i < 24; i += 1) {
      const sparkle = document.createElement("span");
      sparkle.className = "sparkle";
      sparkle.style.left = `${Math.random() * 100}%`;
      sparkle.style.top = `${Math.random() * 100}%`;
      sparkle.style.animationDelay = `${Math.random() * 4.5}s`;
      sparkle.style.animationDuration = `${3.4 + Math.random() * 2.6}s`;
      ambient.appendChild(sparkle);
    }
  </script>
</body>
</html>
